<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DRILL#1 </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
        body{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-align: center;
            margin-top: 80px;
            background-color: rgb(107, 190, 185);
        }

        .container{
            background: white;
            padding: 30px;
            width: 500px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        input{
            padding: 6px;
            width: 80%;
            margin-bottom: 10px;
        }

        button{
            padding: 8px 15px;
        }

        .output{
            margin-top: 15px;
            text-align: left;
        }

</style>

</head>
<body>

    <div class="container">

        <h2> ⚡Electricity Consumption Classifier⚡ </h2>

        <input type="number" id="usage" placeholder="Input kilowatt per hour">
        <br>

        <button onclick="evaluateUsage()"> EVALUATE </button>

        <div class="output">
            <p id="cat"></p>
        </div>

    </div>

<script>
    function evaluateUsage(){
        var usage=document.getElementById("usage").value;

        if(usage===""){
            alert("Please enter an amount.");
            return;
        }

        var cat=""
        if(usage<=100){
            cat="Lifeline Consumer: ";
        } else if(usage<=200){
            cat="Low Consumption: ";
        } else if(usage<=300){
            cat="Average Consumption: ";
        } else if(usage<=500){
            cat="High Consumption: ";
        } else{
            cat="Very High Consumption:";
        }

        var remark=""
        switch(cat){
            case"Lifeline Consumption: ": 
            remark=" Discounted electriity rates.";
            break;

            case"Low Consumption: ":
            remark=" Normal residential rate."
            break;

            case"Average Consumption: ":
            remark=" Typical electricity usage."
            break;

            case"High Consumption: ": 
            remark=" Higher electricity usage.";
            break;

           default:
            remark=" Heavy electricity users."
        }

        document.getElementById("cat").innerHTML="Category - " + cat +
        remark

    }

</script>
    

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
</body>

</html>
